name: "onPush( Build & Test )"

on:
  push:
    branches-ignore:
      - master
jobs:
  build:
    # Standard runner avoids macos-latest-large, which requires higher org
    # spending limits and fails fast when billing / quota is exceeded.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Swift Package Manager (SPM)
        run: flutter config --enable-swift-package-manager

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: |
          flutter pub get
          
          cd application_id
          flutter pub get
          cd ..
          
          cd embedded
          flutter pub get
          cd ..
          
          cd hosted
          flutter pub get
          cd ..

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build AppBundle
        working-directory: embedded
        run: flutter build appbundle --release

      - name: Build APK
        working-directory: embedded
        run: flutter build apk --release

      - name: Build iOS
        working-directory: embedded
        run: flutter build ios --no-codesign
