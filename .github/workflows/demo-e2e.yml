name: Demo Embedded E2E (Flutter)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main]
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set-matrix
        run: |
          JSON=$(env -u GITHUB_OUTPUT node .github/scripts/generate_e2e_matrix.js)
          {
            echo "matrix<<MATRIX_JSON_EOF"
            echo "$JSON"
            echo "MATRIX_JSON_EOF"
          } >> "$GITHUB_OUTPUT"

  embedded-e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Patrol CLI
        run: flutter pub global activate patrol_cli

      - name: Install dependencies
        working-directory: embedded
        run: flutter pub get

      - name: Validate E2E scenario catalog
        run: env -u GITHUB_OUTPUT node .github/scripts/generate_e2e_matrix.js > /dev/null

      - name: Build debug APK + test APK
        working-directory: embedded
        run: patrol build android --target integration_test/e2e/embedded_e2e_tests.dart

      - name: Run embedded E2E on emulator
        env:
          E2E_METHODS: ${{ matrix['test-methods'] }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: embedded
          script: bash ../.github/scripts/run_embedded_e2e_shard.sh

      - name: Collect test reports
        if: always()
        run: |
          mkdir -p e2e-artifacts
          find . -name "TEST-*.xml" -exec cp -f {} e2e-artifacts/ \; 2>/dev/null || true

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: e2e-artifacts/*.xml
          check_name: Flutter E2E (shard ${{ matrix['shard-index'] }})

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: flutter-e2e-shard-${{ matrix['shard-index'] }}
          path: e2e-artifacts/
          if-no-files-found: ignore

  embedded-e2e-ios:
    runs-on: macos-15-xlarge
    timeout-minutes: 60
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Patrol CLI
        run: flutter pub global activate patrol_cli

      - name: Install dependencies
        working-directory: embedded
        run: flutter pub get

      - name: Install pods
        working-directory: embedded/ios
        run: pod install

      - name: Run embedded E2E on iOS Simulator
        working-directory: embedded
        run: |
          patrol test \
            -t integration_test/e2e/embedded_e2e_tests.dart \
            -d "iPhone 16 Pro" \
            --uninstall

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: flutter-e2e-ios-shard-${{ matrix['shard-index'] }}
          path: embedded/build/ios_integ/
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs: [embedded-e2e-android]
    if: always()
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: all-e2e

      - uses: actions/checkout@v5

      - name: Combine summary
        run: node .github/scripts/combine_e2e_summary.js --artifacts-dir all-e2e --summary e2e-summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v6
        with:
          name: e2e-summary
          path: e2e-summary.md
